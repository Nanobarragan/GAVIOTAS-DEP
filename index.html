<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Las Gaviotas - Panel Residencial</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gaviotas">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3104/3104847.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght=300;400;600&display=swap" rel="stylesheet">
    
    <style>
        .font-logo { font-family: 'Cinzel', serif; }
        .font-sublogo { font-family: 'Montserrat', sans-serif; letter-spacing: 0.4em; }
        /* Evitar rebote en iOS */
        body { overscroll-behavior: none; }
        .nav-button.active { color: #0891b2; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-20">

    <header class="bg-white border-b border-slate-100 sticky top-0 z-40">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="font-logo font-bold text-cyan-900">LAS GAVIOTAS</span>
            </div>
        </div>
    </header>

    <main id="app-container" class="max-w-md mx-auto p-4">
        <div id="loading-screen" class="text-center py-20 text-slate-400">
            Cargando sistema...
        </div>
        
        <div id="vista-inicio" class="seccion hidden space-y-4">
            <h2 class="text-lg font-semibold">Bienvenido</h2>
            </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t h-16 flex items-center justify-around z-50">
        <button onclick="navegarA('inicio')" class="nav-button flex flex-col items-center text-slate-400">
            <i data-lucide="home" class="w-6 h-6"></i>
        </button>
        <button onclick="navegarA('estado')" class="nav-button flex flex-col items-center text-slate-400">
            <i data-lucide="activity" class="w-6 h-6"></i>
        </button>
        <button onclick="navegarA('anuncios')" class="nav-button flex flex-col items-center text-slate-400">
            <i data-lucide="megaphone" class="w-6 h-6"></i>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUpbVlkqgr8-To72rS5hIeHJ_cpklknR8",
            authDomain: "gaviotas-efa2b.firebaseapp.com",
            databaseURL: "https://gaviotas-efa2b-default-rtdb.firebaseio.com",
            projectId: "gaviotas-efa2b",
            storageBucket: "gaviotas-efa2b.firebasestorage.app",
            messagingSenderId: "483619094544",
            appId: "1:483619094544:web:470213b77c84921ead0a95"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Función global de navegación
        window.navegarA = function(id) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById('vista-' + id);
            if(target) target.classList.remove('hidden');
            // Re-renderizar iconos al cambiar de vista
            if(window.lucide) lucide.createIcons();
        };

        // Carga de datos
        onValue(ref(db, 'lasGaviotasData'), (snapshot) => {
            const loading = document.getElementById("loading-screen");
            if (loading) loading.classList.add("hidden");
            
            const data = snapshot.val();
            // Lógica para renderizar tus datos aquí
            
            // Forzar renderizado de iconos tras la carga
            if(window.lucide) {
                lucide.createIcons();
            }
            navegarA('inicio');
        }, (error) => {
            console.error("Error al conectar con Firebase:", error);
            document.getElementById("loading-screen").innerText = "Error de conexión. Intente recargar.";
        });
    </script>
</body>
</html>
