<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Las Gaviotas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 sm:p-8 font-sans">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-6 shadow-xl flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-bold text-cyan-400 flex items-center gap-2">
                    <i data-lucide="sliders"></i> Panel de Control Automático
                </h1>
                <p class="text-xs text-slate-400 mt-1">Cualquier cambio aquí enviará notificaciones push automáticas a los vecinos.</p>
            </div>
            <a href="/index.html" class="bg-slate-750 hover:bg-slate-700 text-slate-300 border border-slate-600 px-4 py-2 rounded-xl text-xs font-semibold transition">Volver al Inicio</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-800 border border-slate-700 p-5 rounded-2xl space-y-4 shadow-md text-slate-900">
                <h3 class="font-bold text-xs text-slate-300 uppercase tracking-wider border-b border-slate-700 pb-2">Suministros del Complejo</h3>
                <div>
                    <label class="block text-[11px] text-slate-400 font-bold mb-1">AGUA POTABLE:</label>
                    <select id="adminAgua" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs font-medium outline-none" onchange="actualizarServicio('agua', this.value)">
                        <option value="Disponible">🟢 Disponible</option>
                        <option value="Limitado">🟡 Limitado / Ajustes</option>
                        <option value="Interrupción">🔴 Interrupción / Corte</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[11px] text-slate-400 font-bold mb-1">LUZ DEPARTAMENTOS:</label>
                    <select id="adminLuzDepto" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs font-medium outline-none" onchange="actualizarServicio('luzDepto', this.value)">
                        <option value="Disponible">🟢 Disponible</option>
                        <option value="Limitado">🟡 Limitado / Ajustes</option>
                        <option value="Interrupción">🔴 Interrupción / Corte</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[11px] text-slate-400 font-bold mb-1">LUZ ÁREAS COMUNES:</label>
                    <select id="adminLuzComun" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs font-medium outline-none" onchange="actualizarServicio('luzComun', this.value)">
                        <option value="Disponible">🟢 Disponible</option>
                        <option value="Limitado">🟡 Limitado / Ajustes</option>
                        <option value="Interrupción">🔴 Interrupción / Corte</option>
                    </select>
                </div>
            </div>

            <div class="bg-slate-800 border border-slate-700 p-5 rounded-2xl space-y-3 shadow-md">
                <h3 class="font-bold text-xs text-slate-300 uppercase tracking-wider border-b border-slate-700 pb-2">Nueva Circular Comunitaria</h3>
                <textarea id="nuevoAvisoTexto" rows="4" placeholder="Escribe un anuncio importante para la vista principal..." class="w-full p-2.5 bg-slate-50 text-slate-900 border rounded-xl text-xs outline-none resize-none"></textarea>
                <button onclick="publicarCircular()" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2.5 rounded-xl text-xs transition shadow-sm">Publicar en Tablero</button>
            </div>

            <div class="bg-slate-800 border border-slate-700 p-5 rounded-2xl space-y-3 shadow-md">
                <h3 class="font-bold text-xs text-slate-300 uppercase tracking-wider border-b border-slate-700 pb-2">Registrar en Tabla de Historial</h3>
                <input type="text" id="histNotas" placeholder="Ej: Fuga reparada en torre B..." class="w-full p-2.5 bg-slate-50 text-slate-900 border rounded-xl text-xs outline-none">
                <button onclick="guardarEnHistorial()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-xs transition shadow-sm">Grabar Evento Histórico</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUpbVlkqgr8-To72rS5hIeHJ_cpklknR8",
            authDomain: "gaviotas-efa2b.firebaseapp.com",
            databaseURL: "https://gaviotas-efa2b-default-rtdb.firebaseio.com",
            projectId: "gaviotas-efa2b",
            storageBucket: "gaviotas-efa2b.firebasestorage.app",
            messagingSenderId: "483619094544",
            appId: "1:483619094544:web:470213b77c84921ead0a95"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const baseRef = database.ref('lasGaviotasData');

        let dataLocal = {};

        // Sincronizar selectores con los datos actuales de la nube
        baseRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                dataLocal = data;
                document.getElementById("adminAgua").value = data.agua || "Disponible";
                document.getElementById("adminLuzDepto").value = data.luzDepto || "Disponible";
                document.getElementById("adminLuzComun").value = data.luzComun || "Disponible";
            }
        });

        function obtenerFechaFormateada() {
            const meses = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
            const d = new Date();
            let hr = d.getHours(); const min = String(d.getMinutes()).padStart(2, '0');
            const ampm = hr >= 12 ? 'PM' : 'AM'; hr = hr % 12 || 12;
            return `${d.getDate()} ${meses[d.getMonth()]} • ${hr}:${min} ${ampm}`;
        }

        window.actualizarServicio = function(servicio, valor) {
            baseRef.child(servicio).set(valor);
            baseRef.child('ultimaActualizacion').set(obtenerFechaFormateada());
        };

        window.publicarCircular = function() {
            const txt = document.getElementById("nuevoAvisoTexto");
            if (!txt.value.trim()) return alert("El mensaje está vacío.");
            const d = new Date();
            const fechaCorta = `${d.getDate()} ${["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"][d.getMonth()]}`;
            
            if(!dataLocal.avisos) dataLocal.avisos = [];
            dataLocal.avisos.unshift({ texto: txt.value.trim(), fecha: fechaCorta });
            
            baseRef.child('avisos').set(dataLocal.avisos).then(() => {
                txt.value = "";
                alert("¡Circular publicada con éxito!");
            });
        };

        window.guardarEnHistorial = function() {
            const notas = document.getElementById("histNotas");
            if (!notas.value.trim()) return alert("Por favor escribe una nota descriptiva.");
            
            if(!dataLocal.historial) dataLocal.historial = [];
            dataLocal.historial.unshift({
                fecha: obtenerFechaFormateada(),
                agua: dataLocal.agua || "Disponible",
                luzDepto: dataLocal.luzDepto || "Disponible",
                luzComun: dataLocal.luzComun || "Disponible",
                notas: notas.value.trim()
            });

            baseRef.child('historial').set(dataLocal.historial).then(() => {
                notas.value = "";
                alert("Evento guardado en la tabla de historial.");
            });
        };

        if(window.lucide) lucide.createIcons();
    </script>
</body>
</html>
